apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-applications
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/progate-hackathon-enpower/andere-boxing.git
        revision: main
        directories:
          - path: infra/argocd/manifests/*
  template:
    metadata:
      name: "{{path.basename}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/manifest-generate-paths: .
    spec:
      project: default
      source:
        repoURL: https://github.com/progate-hackathon-enpower/andere-boxing.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 90
          backoff:
            duration: 5s
            maxDuration: 10s
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helms
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/progate-hackathon-enpower/andere-boxing.git
    targetRevision: main
    path: infra/argocd/helms
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true