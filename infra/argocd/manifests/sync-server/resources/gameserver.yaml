apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: sync-server
  namespace: sync-server
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: sync-server
    spec:
      health:
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 5
      ports:
        - name: default
          portPolicy: Dynamic
          containerPort: 4433
          protocol: UDP
        - name: ws
          portPolicy: Dynamic
          containerPort: 4434
          protocol: TCP
      template:
        spec:
          nodeSelector:
            eks.amazonaws.com/nodegroup: andere-boxing-public-node-group
          containers:
            - name: sync-server
              image: 379708350366.dkr.ecr.ap-northeast-1.amazonaws.com/andere-boxing/sync-server:726ac86
              imagePullPolicy: Always
              env:
                - name: CERT
                  valueFrom:
                    secretKeyRef:
                      name: sync-server-tls
                      key: tls.crt
                - name: KEY
                  valueFrom:
                    secretKeyRef:
                      name: sync-server-tls
                      key: tls.key
